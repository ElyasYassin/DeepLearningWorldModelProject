# Default configuration for all components.
# Override values by creating experiment-specific configs that import this one.

env:
  engine: mujoco          # mujoco only
  image_size: 64          # Height and width of RGB observations (pixels)
  max_episode_steps: 500
  robot: Panda            # robosuite robot model
  camera_name: robot0_eye_in_hand  # wrist-mounted camera on the Panda end-effector

encoder:
  latent_dim: 128
  learning_rate: 1.0e-4
  batch_size: 32
  epochs: 50

dynamics:
  d_model: 256
  nhead: 4
  num_layers: 4
  max_seq_len: 64
  learning_rate: 1.0e-4
  batch_size: 32
  epochs: 50

controller:
  hidden_dim: 256
  learning_rate: 3.0e-4
  gamma: 0.99
  imagination_horizon: 15   # Steps to roll out in latent space per update

baselines:
  ppo:
    learning_rate: 3.0e-4
    n_steps: 2048
    batch_size: 64
    n_epochs: 10
    total_timesteps: 1_000_000
  ppo_lstm:
    learning_rate: 1.0e-4
    n_steps: 2048           # steps per rollout (must be divisible by batch_size)
    batch_size: 128         # sequences per update
    n_epochs: 10
    lstm_hidden_size: 256
    n_lstm_layers: 1
    total_timesteps: 1_000_000
  sac:
    learning_rate: 3.0e-4
    buffer_size: 1_000_000
    batch_size: 256
    total_timesteps: 1_000_000
  
  ppo_resnet18:
    learning_rate: 3.0e-4
    n_steps: 2048
    batch_size: 64
    n_epochs: 10
    gamma: 0.99
    total_timesteps: 1_000_000
    visual_dim: 128
    freeze_backbone: true
    policy_hidden_sizes: [256, 256]
    value_hidden_sizes: [256, 256]

  ppo_resnet18_lstm:
    learning_rate: 3.0e-4
    n_steps: 512
    batch_size: 64
    n_epochs: 10
    gamma: 0.99
    total_timesteps: 1_000_000
    visual_dim: 128
    freeze_backbone: true
    lstm_hidden_size: 128
    n_lstm_layers: 1
    policy_hidden_sizes: [128]
    value_hidden_sizes: [128]


evaluation:
  n_eval_episodes: 20
  log_dir: logs/
